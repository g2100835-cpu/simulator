<!DOCTYPE html><html><head><meta charset="utf-8">src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
    <style type="text/css">
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: Microsoft YaHei, Arial, sans-serif;
               background: #f8f9fa; }
        .container { display: flex; height: 100vh; }
        .network-wrapper { flex: 1; display: flex; flex-direction: column; padding: 12px; position: relative; }
        #network {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: linear-gradient(135deg, #fafafa 0%, #f0f0f0 100%);
            min-height: 0;
        }
        .info-panel {
            width: 300px;
            background: white;
            border-left: 1px solid #e0e0e0;
            padding: 16px 14px;
            overflow-y: auto;
        }
        .panel-hint {
            color: #aaa;
            font-size: 13px;
            text-align: center;
            margin-top: 50px;
            line-height: 1.8;
        }
        .panel-title {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }
        .theory-card {
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 10px;
            border-left: 3px solid;
        }
        .theory-name {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 3px;
        }
        .theory-theorist {
            font-size: 12px;
            opacity: 0.75;
            margin-bottom: 5px;
        }
        .relation-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .relation-desc {
            font-size: 12px;
            line-height: 1.6;
            color: #555;
            margin-bottom: 10px;
        }
        .tag-group { font-size: 12px; color: #666; margin-bottom: 3px; }
        .tag-group span { display: inline-block; padding: 1px 7px; border-radius: 8px;
                          font-size: 11px; margin: 2px 2px 0 0; }
        .legend-fixed {
            position: absolute;
            bottom: 14px;
            left: 14px;
            background: rgba(255,255,255,0.95);
            padding: 8px 12px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-size: 11px;
            z-index: 100;
        }
        .legend-row { display: flex; align-items: center; margin: 2px 0; }
        .legend-line { width: 22px; height: 2px; margin-right: 5px; border-radius: 2px; }
        @media (max-width: 700px) {
            .container { flex-direction: column; }
            .info-panel { width: 100%; height: 220px; border-left: none; border-top: 1px solid #e0e0e0; }
        }
    </style>
