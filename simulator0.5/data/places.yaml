# ============================================================
# 地点特征说明
# ============================================================
place_features:
  description: |
    出生地影响人物的初始属性和社会化环境：
    - 城市地区：文化资本较高、场域压力较大、工具理性行动较多、陌生人处境较常见
    - 农村地区：传统行动较多、社区整合度较高、社会流动性较低、差序格局影响较大
    - 城镇地区：介于城乡之间，可能有更多市场导向的机会

  region_effects:
    north: "华北地区，传统礼教影响较深，差序格局明显"
    east: "东部沿海，商品经济发达，工具理性行动较多"
    south: "华南地区，商业文化浓厚，宗族观念较强"
    southwest: "西南地区，文化多样性高，少数民族文化影响"
    west: "西部地区，传统保留较多，教育机会相对较少"

  population_effects:
    megacity: "超大城市：高场域压力、高文化资本、高社会流动性、高陌生人比例"
    large: "大城市：高文化资本、中等场域压力、较好教育机会"
    medium: "中小城市：中等文化资本、一定场域压力"
    small: "小城镇：中等社区整合、市场机会开始出现"
    village: "农村：高社区整合、低流动性、传统行动主导"