# 社会学人生模拟器 - 人物背景模板
# 定义玩家可选择的人物设定选项

character_templates:
  # ==================== 性别 ====================
  gender:
    - id: male
      name: 男性
      emoji: "♂️"
      description: "男性角色"
      starting_modifiers:
        field_pressure: 0.1    # 男性在传统行业可能面临更大场域压力
        risk_exposure: 0.1     # 男性可能更多暴露于工伤风险
        stress_level: 0.0
        social_mobility: 0.0
    - id: female
      name: 女性
      emoji: "♀️"
      description: "女性角色"
      starting_modifiers:
        field_pressure: 0.0
        risk_exposure: 0.0
        stress_level: 0.1      # 女性可能在职场面临玻璃天花板
        social_mobility: -0.1  # 结构性不平等影响向上流动
    - id: other
      name: 其他
      emoji: "⚧"
      description: "其他性别身份"
      starting_modifiers:
        field_pressure: 0.2    # 可能面临更大场域压力
        risk_exposure: 0.1
        stress_level: 0.2
        social_mobility: -0.1

  # ==================== 出生地类型 ====================
  birth_place:
    - id: rural
      name: 农村
      emoji: "🌾"
      description: "传统农村社区，土地束缚，熟人社会"
      location_type: rural_china
      starting_modifiers:
        cultural_capital: -0.2   # 初始文化资本较低
        economic_capital: -0.2  # 初始经济资本较低
        social_capital: 0.1     # 可能拥有较强的地缘社会资本
        traditional_action_weight: 0.3  # 传统行动倾向较强
        community_integration: 0.2     # 初始社区整合度较高
        social_mobility: -0.2    # 社会流动性较低

    - id: small_town
      name: 乡镇
      emoji: "🏘"
      description: "小城镇，介于城乡之间"
      location_type: suburban
      starting_modifiers:
        cultural_capital: -0.1
        economic_capital: -0.1
        social_capital: 0.1
        traditional_action_weight: 0.2
        community_integration: 0.1
        social_mobility: -0.1

    - id: medium_city
      name: 中小城市
      emoji: "🏙"
      description: "中小城市，非一线"
      location_type: medium_city
      starting_modifiers:
        cultural_capital: 0.0
        economic_capital: 0.0
        social_capital: 0.0
        traditional_action_weight: 0.0
        community_integration: 0.0
        social_mobility: 0.0

    - id: large_city
      name: 大城市
      emoji: "🌆"
      description: "省会或一线城市"
      location_type: metropolis
      starting_modifiers:
        cultural_capital: 0.2   # 初始文化资本较高
        economic_capital: 0.1   # 初始经济资本较高
        social_capital: 0.1
        instrumental_rational_weight: 0.2  # 工具理性行动倾向较强
        social_mobility: 0.1
        stress_level: 0.1        # 大城市生活压力较大
        stranger_status: 0.2     # 更可能处于陌生人处境

    - id: capital_city
      name: 超大城市
      emoji: "🏛"
      description: "北京、上海等超大城市"
      location_type: metropolis
      starting_modifiers:
        cultural_capital: 0.3
        economic_capital: 0.2
        social_capital: 0.1
        instrumental_rational_weight: 0.3
        social_mobility: 0.2
        field_pressure: 0.2     # 场域竞争压力较大
        stress_level: 0.2
        stranger_status: 0.3

  # ==================== 时代背景 ====================
  era:
    - id: pre_reform
      name: 改革开放前（1949-1978）
      emoji: "🏮"
      description: "计划经济时代，单位制社会，阶级斗争为纲"
      year_range: [1950, 1978]
      starting_modifiers:
        mechanical_solidarity: 0.3
        social_mobility: -0.2    # 计划经济时代流动性较低
        individualization: -0.3  # 个体化程度低
        traditional_action_weight: 0.3
        rule_of_law: -0.2        # 法治化程度低

    - id: reform_early
      name: 改革开放初期（1978-1990）
      emoji: "📼"
      description: "改革开放初期，经济发展起步，社会开始转型"
      year_range: [1978, 1990]
      starting_modifiers:
        mechanical_solidarity: -0.1
        organic_solidarity: 0.1
        social_mobility: 0.2     # 改革开放初期流动性增加
        individualization: 0.1
        urbanization: 0.2

    - id: reform_middle
      name: 改革开放中期（1990-2000）
      emoji: "📀"
      description: "市场经济深化，教育产业化，城市化加速"
      year_range: [1990, 2000]
      starting_modifiers:
        rationalization: 0.2
        field_pressure: 0.2
        education_opportunity: 0.2
        social_mobility: 0.1
        urbanization: 0.3

    - id: reform_late
      name: 改革开放后期（2000-2010）
      emoji: "💻"
      description: "入世、全球化、互联网崛起，社会分化加剧"
      year_range: [2000, 2010]
      starting_modifiers:
        risk_society: 0.2
        digital_surveillance: 0.2
        field_pressure: 0.3
        rationalization: 0.3
        social_mobility: 0.0
        urbanization: 0.4

    - id: reform_contemporary
      name: 当代（2010至今）
      emoji: "📱"
      description: "移动互联网时代，社会竞争激烈，个体化深化"
      year_range: [2010, 2025]
      starting_modifiers:
        risk_society: 0.3
        digital_surveillance: 0.4
        individualization: 0.3
        field_pressure: 0.4
        impression_management_society: 0.3
        urbanization: 0.5

  # ==================== 父母阶层 ====================
  parent_class:
    - id: working_class
      name: 工人/农民
      emoji: "🔧"
      description: "从事体力劳动或农业生产"
      class_position: working_class
      starting_modifiers:
        economic_capital: -0.3
        cultural_capital: -0.3
        social_capital: 0.0
        field_pressure_resistance: -0.2
        habitus_guided_action: 0.2   # 惯习引导行动倾向较强

    - id: peasant_class
      name: 农民
      emoji: "🌾"
      description: "以农业生产为主"
      class_position: peasant
      starting_modifiers:
        economic_capital: -0.4
        cultural_capital: -0.3
        social_capital: 0.1     # 地缘社会资本
        rural_china: 0.3
        traditional_action_weight: 0.3

    - id: petit_bourgeois
      name: 小资产阶级
      emoji: "🛒"
      description: "小商贩、个体户、小企业主"
      class_position: petit_bourgeois
      starting_modifiers:
        economic_capital: 0.0
        cultural_capital: -0.1
        social_capital: 0.1
        instrumental_rational_weight: 0.2
        social_mobility: 0.1

    - id: white_collar
      name: 白领/职员
      emoji: "💼"
      description: "公司职员、公务员、教师等"
      class_position: white_collar
      starting_modifiers:
        economic_capital: 0.1
        cultural_capital: 0.2
        social_capital: 0.1
        field_pressure: 0.1
        impression_management: 0.1

    - id: professional
      name: 专业技术人员
      emoji: "👔"
      description: "医生、律师、工程师等专业职业"
      class_position: professional
      starting_modifiers:
        economic_capital: 0.2
        cultural_capital: 0.4
        social_capital: 0.2
        value_rational_action: 0.2
        field_pressure: 0.2

    - id: upper_class
      name: 上层阶级/精英
      emoji: "🏰"
      description: "企业家、高管、政府高级官员"
      class_position: elite
      starting_modifiers:
        economic_capital: 0.4
        cultural_capital: 0.3
        social_capital: 0.3
        field_pressure_resistance: 0.3
        social_mobility: 0.3

  # ==================== 虚构人物预设 ====================
  # 玩家可以直接选择的预设人物
  preset_characters:
    - id: rural_girl_1990
      name: "农村女孩（1990s）"
      emoji: "👧"
      description: "出生于1990年代农村家庭的女孩，父母是农民"
      gender: female
      birth_place: rural
      era: reform_middle
      parent_class: peasant_class
      starting_attributes:
        education_level: 0
        cultural_capital: 0.2
        economic_capital: 0.1
        social_capital: 0.3
        anomie_level: 0.2
        stress_level: 0.2
        social_mobility: 0.3  # 有上升流动的机会

    - id: urban_son_2000
      name: "城市男孩（2000s）"
      emoji: "👦"
      description: "出生于2000年代大城市双职工家庭，父亲是工程师，母亲是教师"
      gender: male
      birth_place: large_city
      era: reform_late
      parent_class: professional
      starting_attributes:
        education_level: 0
        cultural_capital: 0.5
        economic_capital: 0.4
        social_capital: 0.4
        anomie_level: 0.1
        stress_level: 0.2
        social_mobility: 0.5

    - id: small_town_girl_1980
      name: "小镇女孩（1980s）"
      emoji: "👩"
      description: "出生于1980年代小镇家庭，父母是工人"
      gender: female
      birth_place: small_town
      era: reform_early
      parent_class: working_class
      starting_attributes:
        education_level: 0
        cultural_capital: 0.3
        economic_capital: 0.2
        social_capital: 0.3
        anomie_level: 0.2
        stress_level: 0.1
        social_mobility: 0.4

    - id: elite_family_son
      name: "精英家庭之子"
      emoji: "🎓"
      description: "出生于北京上层家庭，父母是企业家和学者"
      gender: male
      birth_place: capital_city
      era: reform_contemporary
      parent_class: upper_class
      starting_attributes:
        education_level: 0
        cultural_capital: 0.7
        economic_capital: 0.6
        social_capital: 0.5
        anomie_level: 0.1
        stress_level: 0.3
        social_mobility: 0.7

    - id: migrant_worker
      name: "进城务工者"
      emoji: "👷"
      description: "出生于农村，成年后进城务工"
      gender: male
      birth_place: rural
      era: reform_middle
      parent_class: peasant_class
      starting_attributes:
        education_level: 0
        cultural_capital: 0.1
        economic_capital: 0.1
        social_capital: 0.2
        anomie_level: 0.3
        stress_level: 0.3
        social_mobility: 0.2
        stranger_status: 0.3