<!DOCTYPE html><html><head><meta charset="utf-8"><script src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script><style>body{margin:0;padding:0;font-family:Arial,sans-serif}#net{width:100vw;height:100vh;}</style></head><body><div id="net"></div><script>var nodes=new vis.DataSet([{id:"mechanical_solidarity",label:"机械",color:"#e74c3c"},{id:"organic_solidarity",label:"有机",color:"#e74c3c"},{id:"rationalization",label:"理性化",color:"#3498db"},{id:"disenchantment",label:"祛魅",color:"#3498db"}]);var edges=new vis.DataSet([{id:'e0',from:'mechanical_solidarity',to:'organic_solidarity',color:{color:'#c0392b',highlight:'#c0392b',opacity:0.7},dashes:true,width:3},{id:'e1',from:'rationalization',to:'disenchantment',color:{color:'#27ae60',highlight:'#27ae60',opacity:0.7},dashes:false,width:3}]);var container=document.getElementById("net");var network=new vis.Network(container,{nodes:nodes,edges:edges},{physics:{enabled:true,stabilization:{iterations:100}},interaction:{hover:false}});network.on("click",function(p){console.log("clicked",p);});document.title="Test OK";</script></body></html>
