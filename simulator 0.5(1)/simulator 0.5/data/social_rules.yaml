# 社会规则定义 - 根据选中的社会结构生成该社会的规则
# 每个社会有：教育制度、工作制度、婚姻制度、 surveillance监控程度

social_rules:
  # 默认规则
  default:
    name: "现代社会"
    education:
      compulsory_years: 9
      school_start_age: 6
      primary_years: 6
      middle_years: 3
      high_years: 3
      university_years: 4
    work:
      min_age: 16
      typical_first_job: 18
      retirement_age: 60
    marriage:
      legal_age: 22
      arranged_ratio: 0.2
    social:
      class_mobility: 0.3
      urban_freedom: 0.5

