  # ============================================================
  # 【高压场域事件】- 22个（布迪厄《区分》《资本的形式》体系）
  # ============================================================
  field_pressure_high:
    description: 高压场域特有事件——位置争夺、资本转换、惯习错位、符号暴力、场域规则
    events:
      - id: fph_family_capital_advantage
        name: 家庭资本优势显现
        age_range: [0, 10]
        weight: 0.5
        description: 「家庭提供经济+文化+社会资本组合，子女获得场域入场的先天优势」
        outcomes:
          field_pressure: [+0.2, +0.3]
          social_status: [+0.2, +0.3]
        sociological_reading: 「场域位置由资本总量与构成决定——inherited capital是入场券的核心（布迪厄）」

      - id: fph_entry_ticket_acquisition
        name: 获得场域入场券
        age_range: [16, 25]
        weight: 0.55
        description: 「通过学历、资格考试或特殊途径获得场域入场资格——入场券是争夺的前提」
        outcomes:
          cultural_capital: [+0.3, +0.4]
          social_status: [+0.2, +0.3]
        sociological_reading: 「入场券是场域竞争的资格认证——没有入场券连参与争夺的资格都没有（布迪厄）」

      - id: fph_first_position_struggle
        name: 第一次场域位置争夺
        age_range: [19, 30]
        weight: 0.5
        description: 「新人入场后首次感受到场域内位置争夺的压力——这个圈子里谁说了算」
        outcomes:
          field_pressure: [+0.3, +0.5]
          stress_level: [+0.2, +0.4]
        sociological_reading: 「场域是竞争空间——入场者必须面对已有位置者的规则和权力格局（布迪厄）」

      - id: fph_position_upward_mobility
        name: 位置上升——挤掉竞争对手
        age_range: [25, 45]
        weight: 0.35
        description: 「在场域中取得实质性上升，同时导致另一位置者下降——零和博弈的本质」
        outcomes:
          field_pressure: [+0.4, +0.6]
          social_status: [+0.3, +0.5]
          stress_level: [+0.2, +0.3]
        sociological_reading: 「场域位置的上升永远是相对的——有人上升必然意味着有人被挤下（布迪厄）」

      - id: fph_position_defense
        name: 位置保卫战
        age_range: [30, 55]
        weight: 0.4
        description: 「作为场域中的已有位置者，抵抗新入场者的挑战——保守vs开放的两难」
        outcomes:
          field_pressure: [+0.3, +0.5]
          stress_level: [+0.3, +0.5]
        sociological_reading: 「支配者的本能是维护规则——开放意味着稀释自身权力的合法性（布迪厄）」

      - id: fph_subversive_challenge
        name: 颠覆现有规则
        age_range: [25, 50]
        weight: 0.25
        description: 「被支配者或新入场者挑战场域的合法性标准——高风险行为，成功率极低」
        outcomes:
          field_pressure: [+0.5, +0.7]
          social_status: [-0.3, +0.2]
          stress_level: [+0.4, +0.6]
        sociological_reading: 「颠覆场域规则需要结构性条件——否则代价远大于收益（布迪厄）」

      - id: fph_alliance_network_formation
        name: 联盟网络形成
        age_range: [22, 40]
        weight: 0.45
        description: 「在场域中与其他行动者建立联盟——联合策略vs独占策略」
        outcomes:
          social_capital: [+0.2, +0.4]
          field_pressure: [+0.1, +0.2]
        sociological_reading: 「社会资本是场域中重要的权力资源——联盟可以放大个体的资本效力（布迪厄）」

      - id: fph_exclusion_mechanism
        name: 被场域排斥——出局
        age_range: [20, 50]
        weight: 0.3
        description: 「因挑战规则失败或得罪关键人物而被场域边缘化——失去位置和资本」
        outcomes:
          field_pressure: [-0.3, -0.4]
          social_status: [-0.4, -0.5]
          stress_level: [+0.4, +0.6]
        sociological_reading: 「场域的排斥机制是最有效的权力工具——被排斥者失去的不只是位置，还有意义（布迪厄）」

      - id: fph_capital_conversion_success
        name: 资本成功转换
        age_range: [20, 50]
        weight: 0.4
        description: 「经济资本转换为文化资本，或社会资本兑现为经济资本——转换有损耗」
        outcomes:
          cultural_capital: [+0.2, +0.4]
          economic_capital: [-0.1, -0.2]
        sociological_reading: 「资本转换需要时间、劳动和特定的社会条件——转换不是无损的（布迪厄）」

      - id: fph_capital_inflation
        name: 资本通胀——学历贬值
        age_range: [25, 45]
        weight: 0.45
        description: 「持有的制度化文化资本因普及而贬值——区分利润下降」
        outcomes:
          cultural_capital: [-0.2, -0.3]
          stress_level: [+0.2, +0.4]
        sociological_reading: 「学历通胀是文化资本贬值的核心机制——当所有人都有入场券时，入场券就不再稀缺（布迪厄）」

      - id: fph_new_distinction_marker
        name: 寻找新的区分标记
        age_range: [30, 55]
        weight: 0.35
        description: 「原有区分标记被大众化后，投资于新的稀缺文化标记以维持区分」
        outcomes:
          cultural_capital: [+0.2, +0.4]
          economic_capital: [-0.2, -0.3]
        sociological_reading: 「区分标记会随时间贬值——维护区分需要持续投资于新的稀缺资本（布迪厄）」

      - id: fph_habitus_mismatch_pain
        name: 惯习与场域的错位痛苦
        age_range: [18, 40]
        weight: 0.5
        description: 「社会上升后旧惯习与新场域不匹配——说话方式、品味、判断力的格格不入」
        outcomes:
          stress_level: [+0.3, +0.5]
          field_pressure: [+0.2, +0.3]
        sociological_reading: 「惯习的滞后性(hysteresis)是社会流动的核心痛苦——位置变了，惯习还在原地（布迪厄）」

      - id: fph_taste_exposure
        name: 品味暴露——说错话的代价
        age_range: [18, 35]
        weight: 0.45
        description: 「在正式场合因品味、语言、礼仪的错位而被标记为外行者——暴露阶级出身」
        outcomes:
          stress_level: [+0.2, +0.4]
          social_status: [-0.2, -0.3]
        sociological_reading: 「品味是最直接的阶级标记——知道自己说错话本身就是阶级性的体现（布迪厄）」

      - id: fph_field_specific_logic_mastery
        name: 掌握场域特殊逻辑
        age_range: [22, 40]
        weight: 0.5
        description: 「逐渐领悟场域内的隐性规则——什么是这里真正重要的——惯习与场域开始契合」
        outcomes:
          cultural_capital: [+0.2, +0.3]
          field_pressure: [-0.1, -0.2]
        sociological_reading: 「场域特殊逻辑的掌握是身体化资本的核心——知道规则才能运用规则（布迪厄）」

      - id: fph_symbolic_violence_accepted
        name: 将结构性不平等误识为自然
        age_range: [10, 30]
        weight: 0.5
        description: 「把场域中的筛选机制归因于能力不足或努力不够——而非结构性因素」
        outcomes:
          stress_level: [+0.1, +0.2]
          anomie_level: [+0.1, +0.2]
        sociological_reading: 「符号暴力的核心是让被统治者认同对自己的统治——误识是再生产的关键机制（布迪厄）」

      - id: fph_misrecognition_of_talent
        name: 天赋叙事被内化
        age_range: [10, 20]
        weight: 0.45
        description: 「学业或场域成功被归因为天赋而非家庭资本传递——误识的深层运作」
        outcomes:
          cultural_capital: [+0.1, +0.2]
          stress_level: [+0.1, +0.2]
        sociological_reading: 「天赋叙事不仅遮蔽真相，而且生产真相——相信天赋的人确实表现更好（布迪厄）」

      - id: fph_reproduction_strategy_child_education
        name: 子女教育策略——集中投资
        age_range: [28, 50]
        weight: 0.5
        description: 「采取少子女+高教育投资的马尔萨斯策略——确保文化资本集中传递」
        outcomes:
          economic_capital: [-0.2, -0.3]
          cultural_capital: [+0.1, +0.2]
        sociological_reading: 「生育策略与教育策略是再生产策略体系的核心——多子女等于低人均投资（布迪厄）」

      - id: fph_reproduction_strategy_school_choice
        name: 精心选择子女学校
        age_range: [30, 50]
        weight: 0.45
        description: 「为子女选择高门槛学校——学校选择是文化资本传递的关键环节」
        outcomes:
          economic_capital: [-0.2, -0.3]
          cultural_capital: [+0.1, +0.2]
        sociological_reading: 「学校是文化资本合法化的核心机构——选择学校就是选择社交网络和阶级位置（布迪厄）」

      - id: fph_reproduction_strategy_homogamy
        name: 同类婚策略
        age_range: [22, 40]
        weight: 0.4
        description: 「通过同类婚确保资本同质性——婚姻是文化资本与社会资本的整合机会」
        outcomes:
          social_capital: [+0.2, +0.3]
          cultural_capital: [+0.1, +0.2]
        sociological_reading: 「同类婚是再生产策略的核心——确保资本构成不因婚姻而稀释（布迪厄）」

      - id: fph_inheritance_crisis
        name: 传承危机——子女能否继承位置
        age_range: [40, 65]
        weight: 0.4
        description: 「子女的文化资本和惯习能否支撑在场域中的位置——传承失败的高风险期」
        outcomes:
          stress_level: [+0.3, +0.5]
          cultural_capital: [-0.2, +0.2]
        sociological_reading: 「传承危机是支配位置的普遍困境——子女的惯习不一定能匹配父母的场域（布迪厄）」

      - id: fph_field_autonomy_invasion
        name: 场域自主性受到侵蚀
        age_range: [30, 60]
        weight: 0.35
        description: 「经济场域或政治场域的力量入侵——场域的自主逻辑被外部逻辑取代」
        outcomes:
          field_pressure: [+0.3, +0.5]
          stress_level: [+0.2, +0.4]
        sociological_reading: 「每个场域都有相对自主性——当他律力量入侵时，场域内部逻辑被改变（布迪厄）」

      - id: fph_capital_stakes_revelation
        name: 场域赌注的揭示
        age_range: [25, 45]
        weight: 0.4
        description: 「意识到场域位置争夺的真正赌注——谁属于这个社会世界，谁被排除在外」
        outcomes:
          field_pressure: [+0.1, +0.2]
          stress_level: [+0.2, +0.3]
        sociological_reading: 「当行动者意识到场域赌注的真正含义时，场域的符号暴力才真正生效——被排除比输掉更可怕（布迪厄）」

  # ============================================================
  # 【高文化资本事件】- 22个（布迪厄《区分》《资本的形式》体系）
  # ============================================================
  cultural_capital_high:
    description: 高文化资本特有事件——身体化资本、合法品味、区分逻辑、隐蔽传承、教育通胀
    events:
      - id: cch_early_cultural_immersion
        name: 早期文化浸润
        age_range: [0, 10]
        weight: 0.55
        description: 「家庭日常实践中的文化传承——博物馆、音乐会、外语、书房的潜移默化」
        outcomes:
          cultural_capital: [+0.3, +0.5]
          stress_level: [+0.0, +0.0]
        sociological_reading: 「身体化资本获取最关键的时期是童年——这段时间无法压缩或替代（布迪厄）」

      - id: cch_language_advantage
        name: 语言资本的先天优势
        age_range: [3, 12]
        weight: 0.5
        description: 「家庭中使用的复杂句法、丰富词汇和表达方式——语言是最重要的身体化资本」
        outcomes:
          cultural_capital: [+0.2, +0.4]
          social_status: [+0.1, +0.2]
        sociological_reading: 「语言句法的复杂性是文化资本的核心指标——这种差异在3到5岁就已基本定型（布迪厄）」

      - id: cch_aesthetic_disposition_formation
        name: 审美配置的形成
        age_range: [5, 15]
        weight: 0.5
        description: 「从小习得将任何事物纳入审美框架的能力——这是什么意义的追问方式」
        outcomes:
          cultural_capital: [+0.2, +0.3]
          stress_level: [+0.0, +0.0]
        sociological_reading: 「审美配置是一种将万物审美化的能力——这不是知识而是身体化的感觉（布迪厄）」

      - id: cch_school_performance_misrecognition
        name: 学业成功被误识为天赋
        age_range: [11, 18]
        weight: 0.5
        description: 「因家庭文化资本而学业领先，但被归因为聪明——误识的第一次深化」
        outcomes:
          cultural_capital: [+0.2, +0.3]
          stress_level: [+0.1, +0.2]
        sociological_reading: 「学业表现的差异被归因于天赋——这掩盖了家庭文化资本传递的真实因果（布迪厄）」

      - id: cch_elite_school_entry
        name: 进入顶尖学校
        age_range: [15, 20]
        weight: 0.55
        description: 「凭借文化资本优势进入高门槛学校——与同等资本背景者的深度社交」
        outcomes:
          cultural_capital: [+0.3, +0.4]
          social_capital: [+0.2, +0.3]
        sociological_reading: 「顶尖学校是文化资本密集人群的聚合器——入学本身就是文化资本的认证（布迪厄）」

      - id: cch_examination_success
        name: 考试竞争中的胜利
        age_range: [17, 25]
        weight: 0.55
        description: 「在竞争性考试中脱颖而出——制度化文化资本获取的关键节点」
        outcomes:
          cultural_capital: [+0.3, +0.5]
          social_status: [+0.2, +0.3]
        sociological_reading: 「竞争性考试将连续的差异转化为截断性的差异——制造天赋的假象（布迪厄）」

      - id: cch_academic_credential_acquisition
        name: 获得高学历资格
        age_range: [22, 30]
        weight: 0.5
        description: 「获得学士、硕士、博士或专业资格——制度化文化资本的最终形态」
        outcomes:
          cultural_capital: [+0.4, +0.6]
          social_status: [+0.3, +0.4]
        sociological_reading: 「学历是通过集体魔法将文化资本制度化——赋予其法律保证的、相对独立于持有者的价值（布迪厄）」

      - id: cch_legitimate_taste_demonstration
        name: 合法品味的展示
        age_range: [18, 35]
        weight: 0.5
        description: 「在文化消费中展示自然的审美判断——古典音乐、先锋艺术、精致烹饪」
        outcomes:
          cultural_capital: [+0.2, +0.3]
          social_status: [+0.1, +0.2]
        sociological_reading: 「合法品味不是自然审美能力，而是统治阶级文化资本的身体化产物（布迪厄）」

      - id: cch_distinction_strategy_update
        name: 区分策略的更新
        age_range: [25, 45]
        weight: 0.4
        description: 「原有文化标记被大众化后，主动寻找新的稀缺文化标记以维持区分」
        outcomes:
          cultural_capital: [+0.2, +0.3]
          economic_capital: [-0.2, -0.3]
        sociological_reading: 「区分的本质是与大众不同——当大众获得某种文化能力时，必须转向新的区分标记（布迪厄）」

      - id: cch_aesthetic_innovation
        name: 审美创新——先锋文化实践
        age_range: [20, 40]
        weight: 0.4
        description: 「从审美消费者转向审美创造者——创造新的文化标记，定义新的合法性标准」
        outcomes:
          cultural_capital: [+0.3, +0.5]
          stress_level: [+0.1, +0.3]
        sociological_reading: 「文化先锋是区分游戏的前沿——创造新的稀缺标记以对抗大众化趋势（布迪厄）」

      - id: cch_taste_anxiety
        name: 品味焦虑——中产化的错位
        age_range: [23, 40]
        weight: 0.4
        description: 「在文化消费中担心暴露阶级出身——过度的文化意愿(pre-tension)导致的不自然」
        outcomes:
          stress_level: [+0.2, +0.4]
          cultural_capital: [+0.1, +0.2]
        sociological_reading: 「品味焦虑是错位感的具体表现——良好的文化意愿本身就标记了阶级位置（布迪厄）」

      - id: cch_credential_inflation
        name: 学历通胀——文化资本贬值
        age_range: [25, 45]
        weight: 0.45
        description: 「所持有的学历或资格因普及而失去区分价值——必须寻找新的区分标记」
        outcomes:
          cultural_capital: [-0.2, -0.3]
          stress_level: [+0.2, +0.4]
        sociological_reading: 「学历通胀使制度化文化资本贬值——但身体化资本不因通胀而贬值（布迪厄）」

      - id: cch_transmission_dilemma
        name: 传承困境——文化资本能否传递
        age_range: [35, 55]
        weight: 0.45
        description: 「文化资本的身体化本质使代际传递困难——子女无法简单继承父母的惯习」
        outcomes:
          cultural_capital: [-0.1, +0.2]
          stress_level: [+0.2, +0.4]
        sociological_reading: 「文化资本传递最隐蔽但也最困难——身体化资本无法通过礼物或金钱传递（布迪厄）」

      - id: cch_excessive_investment_anxiety
        name: 过度教育投资焦虑
        age_range: [30, 50]
        weight: 0.4
        description: 「为子女教育投入远超必要限度的资源——焦虑本身成为阶级性的标志」
        outcomes:
          economic_capital: [-0.3, -0.4]
          stress_level: [+0.3, +0.5]
        sociological_reading: 「过度教育投资是中产阶级维持阶级位置的核心策略——但焦虑本身标记了阶级（布迪厄）」

      - id: cch_habitus_field_fit
        name: 惯习与场域的如鱼得水
        age_range: [18, 35]
        weight: 0.5
        description: 「文化资本高者自然适应高文化场域——品味、判断力、语言都是自然的」
        outcomes:
          cultural_capital: [+0.1, +0.2]
          stress_level: [-0.2, -0.3]
        sociological_reading: 「惯习与场域的契合是文化资本高者特有的运气——这其实是结构的产物（布迪厄）」

      - id: cch_double_reading_capability
        name: 双重阅读能力
        age_range: [20, 40]
        weight: 0.45
        description: 「能够同时以审美和世俗眼光看待同一事物——高文化资本者的特殊能力」
        outcomes:
          cultural_capital: [+0.2, +0.3]
          stress_level: [-0.1, -0.1]
        sociological_reading: 「审美配置允许在文化消费中向下兼容——这是身体化资本的体现（布迪厄）」

      - id: cch_symbolic_violence_perpetrator
        name: 符号暴力的实施者
        age_range: [25, 50]
        weight: 0.35
        description: 「在无意识中通过品味判断、资格标准等实施符号暴力——而不自觉」
        outcomes:
          stress_level: [+0.1, +0.2]
          social_status: [+0.1, +0.2]
        sociological_reading: 「符号暴力最有效的形式是让被统治者参与对自己的统治——支配者往往不觉察（布迪厄）」

      - id: cch_freedom_taste_demonstration
        name: 自由品味的从容展示
        age_range: [30, 55]
        weight: 0.4
        description: 「对生活样式的从容选择——住所、旅行、子女教育方式都是自由的」
        outcomes:
          cultural_capital: [+0.1, +0.2]
          stress_level: [-0.1, -0.2]
        sociological_reading: 「统治阶级的品味表现为自由——这是对现实条件的适应而非真正选择（布迪厄）」

      - id: cch_cultural_capital_defense
        name: 文化资本的防御性投资
        age_range: [40, 60]
        weight: 0.4
        description: 「为维持文化资本优势，投资于新的稀缺文化领域——对抗贬值的持续努力」
        outcomes:
          economic_capital: [-0.2, -0.3]
          cultural_capital: [+0.1, +0.2]
        sociological_reading: 「维护区分需要持续投资——文化资本的收益取决于其稀缺性而非数量（布迪厄）」

      - id: cch_inherited_capital_crisis
        name: 继承的资本与个人成就的张力
        age_range: [30, 50]
        weight: 0.35
        description: 「意识到自身成就与继承资本的关系——符号暴力意识的萌芽」
        outcomes:
          stress_level: [+0.1, +0.3]
          cultural_capital: [+0.0, +0.2]
        sociological_reading: 「反思结构优势是可能的——但惯习仍会持续标记阶级出身（布迪厄）
      - id: cch_objectified_capital_possession
        name: 客观化文化资本的占有
        age_range: [15, 40]
        weight: 0.4
        description: 「购买书籍、画作、乐器等文化商品——但消费需要身体化资本」
        outcomes:
          cultural_capital: [+0.1, +0.2]
          economic_capital: [-0.2, -0.3]
        sociological_reading: 「文化商品可以购买，但文化资本的消费需要预先灌输的时间和审美判断（布迪厄）」

      - id: cch_institutional_capital_defense
        name: 制度化资本的防御性维护
        age_range: [35, 60]
        weight: 0.35
        description: 「通过续约、评审委员、专业认证等维护已获得的制度化文化资本」
        outcomes:
          cultural_capital: [+0.1, +0.2]
          economic_capital: [-0.2, -0.3]
        sociological_reading: 「制度化资本需要持续维护，否则会因通胀或规则变化而贬值（布迪厄）」」

  # ============================================================
  # 【低文化资本事件】- 22个（布迪厄《区分》《再生产》体系）
  # ============================================================
  cultural_capital_low:
    description: 低文化资本特有事件——必然趣味、自我淘汰、时间贫困、替代满足、符号暴力承受
    events:
      - id: ccl_necessity_taste_formation
        name: 必然趣味的形成
        age_range: [0, 10]
        weight: 0.55
        description: 「在物质匮乏环境中形成适应性偏好——务实、直接、即时的消费偏好」
        outcomes:
          cultural_capital: [-0.1, -0.1]
          stress_level: [+0.1, +0.2]
        sociological_reading: 「必然趣味是对客观必然的适应性调整——不是缺乏品味而是条件约束下的理性适应（布迪厄）」

      - id: ccl_school_mediocrity_internalized
        name: 学校中的正常位置
        age_range: [11, 16]
        weight: 0.5
        description: 「学业中游或偏下——被标记为够用而非优秀，满足于普通」
        outcomes:
          education_level: [-0.1, -0.2]
          stress_level: [+0.1, +0.2]
        sociological_reading: 「学校中的正常位置是被建构的——够用的逻辑再生产了低文化资本位置（布迪厄）」

      - id: ccl_early_labor_market_entry
        name: 提前进入劳动力市场
        age_range: [15, 20]
        weight: 0.55
        description: 「家庭无法提供自由时间，被迫提前进入劳动力市场——时间贫困的起点」
        outcomes:
          economic_capital: [+0.2, +0.3]
          education_level: [-0.2, -0.3]
        sociological_reading: 「自由时间是文化资本积累的前提——低文化资本家庭无法提供这种时间（布迪厄）」

      - id: ccl_self_elimination_triggered
        name: 自我淘汰启动
        age_range: [12, 18]
        weight: 0.5
        description: 「将极低的被选概率内化为不适合——主动退出教育竞争，被误识为自愿」
        outcomes:
          education_level: [-0.3, -0.4]
          stress_level: [+0.2, +0.4]
        sociological_reading: 「自我淘汰是被统治阶级将客观的极低被选概率内化为对高等教育的排斥（布迪厄）」

      - id: ccl_teacher_low_expectation_effect
        name: 教师低期望效应
        age_range: [8, 16]
        weight: 0.45
        description: 「教师对低文化资本家庭子女的低期望被学生内化——表现随期望下降」
        outcomes:
          education_level: [-0.2, -0.3]
          stress_level: [+0.2, +0.3]
        sociological_reading: 「教师期望效应是符号暴力的学校形态——被低估导致实际表现下降（布迪厄）」

      - id: ccl_early_signal_failure
        name: 学业困难的早期信号
        age_range: [6, 12]
        weight: 0.5
